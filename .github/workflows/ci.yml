name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest -q

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify UI is packaged in wheel
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              raise SystemExit("no wheel produced")
          wheel = wheels[-1]
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())
          target = "flockmem/ui/index.html"
          if target not in names:
              raise SystemExit(f"missing {target} in {wheel}")
          print(f"wheel ok: {wheel}")
          PY

